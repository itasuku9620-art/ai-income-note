name: Agent - Research (事例リサーチ)

on:
  schedule:
    # 毎日 07:00 JST = UTC 22:00（前日）
    - cron: "0 22 * * *"
  workflow_dispatch:

jobs:
  research-agent:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npm ci
      - name: Run research_agent
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: node scripts/agents/research_agent.cjs
      - name: Commit
        run: |
          git config --local user.email "actions@github.com"
          git config --local user.name "GitHub Actions"
          git add data/ logs/
          git diff --staged --quiet || git commit -m "research_agent: リサーチ更新 $(date +%Y-%m-%d)"
          git push
