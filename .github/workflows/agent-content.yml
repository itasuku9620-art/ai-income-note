name: Agent - Content (X投稿文生成)

on:
  schedule:
    # 毎日 10:00 JST = UTC 01:00
    - cron: "0 1 * * *"
  workflow_dispatch:

jobs:
  content-agent:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm ci

      - name: Run content_agent
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: node scripts/agents/content_agent.cjs

      - name: Commit generated files
        run: |
          git config --local user.email "actions@github.com"
          git config --local user.name "GitHub Actions"
          git add data/ pending_approval/
          git diff --staged --quiet || git commit -m "content_agent: X投稿文A/B/C生成 $(date +%Y-%m-%d)"
          git push
