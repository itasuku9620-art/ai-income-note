name: Agent - Note (記事下書き生成)

on:
  schedule:
    # 毎日 11:00 JST = UTC 02:00
    - cron: "0 2 * * *"
  workflow_dispatch:

jobs:
  note-agent:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npm ci
      - name: Run note_agent
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: node scripts/agents/note_agent.cjs
      - name: Commit
        run: |
          git config --local user.email "actions@github.com"
          git config --local user.name "GitHub Actions"
          git add data/ pending_approval/ outputs/
          git diff --staged --quiet || git commit -m "note_agent: 記事下書き生成 $(date +%Y-%m-%d)"
          git pull --no-rebase -X ours origin main
          git push
