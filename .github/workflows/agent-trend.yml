name: Agent - Trend (キーワード収集)

on:
  schedule:
    # 毎日 06:00 JST = UTC 21:00（前日）
    - cron: "0 21 * * *"
  workflow_dispatch:

jobs:
  trend-agent:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npm ci
      - name: Run trend_agent
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: node scripts/agents/trend_agent.cjs
      - name: Commit
        run: |
          git config --local user.email "actions@github.com"
          git config --local user.name "GitHub Actions"
          git add data/
          git diff --staged --quiet || git commit -m "trend_agent: キーワード更新 $(date +%Y-%m-%d)"
          git pull --rebase origin main
          git push
