name: Post Approved X

on:
  repository_dispatch:
    types: [approved-x-post]
  schedule:
    # 毎日 07:00 JST = UTC 22:00（前日）
    - cron: "0 22 * * *"
  workflow_dispatch:
    inputs:
      selected_pattern:
        description: "投稿するパターン (A/B/C)"
        required: false
        default: "A"

jobs:
  post-x:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm ci

      - name: Determine pattern
        id: pattern
        run: |
          # repository_dispatch の場合は client_payload から取得
          PATTERN="${{ github.event.client_payload.selected_pattern }}"
          # workflow_dispatch の場合は input から取得
          if [ -z "$PATTERN" ]; then
            PATTERN="${{ github.event.inputs.selected_pattern }}"
          fi
          # cron の場合はデフォルト A
          if [ -z "$PATTERN" ]; then
            PATTERN="A"
          fi
          echo "pattern=$PATTERN" >> $GITHUB_OUTPUT
          echo "投稿パターン: $PATTERN"

      - name: Post to X
        env:
          X_API_KEY: ${{ secrets.X_API_KEY }}
          X_API_SECRET: ${{ secrets.X_API_SECRET }}
          X_ACCESS_TOKEN: ${{ secrets.X_ACCESS_TOKEN }}
          X_ACCESS_TOKEN_SECRET: ${{ secrets.X_ACCESS_TOKEN_SECRET }}
          SELECTED_PATTERN: ${{ steps.pattern.outputs.pattern }}
        run: node scripts/agents/x_post.cjs

      - name: Commit flag file
        run: |
          git config --local user.email "actions@github.com"
          git config --local user.name "GitHub Actions"
          git add data/
          git diff --staged --quiet || git commit -m "x_post: 投稿フラグ更新 $(date +%Y-%m-%d)"
          git pull --rebase origin main
          git push
